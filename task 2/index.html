<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Frontend Club task 2</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Hanuman:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="styles/wrapper.css" />
        <link rel="stylesheet" href="styles/header.css" />
        <link rel="stylesheet" href="styles/image.css" />
        <link rel="stylesheet" href="styles/ProgressList.css" />
        <link rel="stylesheet" href="styles/satisfactionCard.css" />
        <link rel="stylesheet" href="styles/statsCard.css" />
        <link rel="stylesheet" href="styles/general.css" />
    </head>
    <body>
        <div class="wrapper">
            <div class="flex1">
                <p class="about-us">ABOUT US</p>
                <div>
                    <p class="title">
                        The role of user experience in modern design
                    </p>
                </div>
                <div class="flex2">
                    <img class="image" src="images/image 1.png" alt="" />
                    <div class="flex3">
                        <div class="stat-card flex3-a">
                            <p class="k4">4K</p>
                            <div class="flex3-b">
                                <div>
                                    <p class="stats-heading">Happy customers</p>
                                    <p class="stats-text">
                                        We believe that the key to our success
                                        lies in understanding our clients.
                                    </p>
                                </div>
                                <div class="flex3-c">
                                    <div class="customers-avatars">
                                        <img src="icons/avatar1.jpg" alt="left" class="avatar left"/>
                                        <img src="icons/avatar2.jpg" alt="middle" class="avatar middle"/>
                                        <img src="icons/avatar3.jpg" alt="right" class="avatar right"/>
                                    </div>
                                    <p class="stats-text2">
                                        Sustainable
                                        <span style="color: #fe9a00"
                                            >creativity,</span
                                        >
                                        timeless appeal.
                                    </p>
                                </div>
                            </div>
                        </div>
                        <div class="flex4">
                            <div class="progress-list">
                                <div class="progress-row">
                                    <span class="progress-measures"
                                        >Strategy</span
                                    >
                                    <span class="progress-percentage">75%</span>
                                </div>
                                <div class="progress-row">
                                    <span class="progress-measures"
                                        >Design</span
                                    >
                                    <span class="progress-percentage">85%</span>
                                </div>
                                <div class="progress-row">
                                    <span class="progress-measures"
                                        >Strategy</span
                                    >
                                    <span class="progress-percentage">75%</span>
                                </div>
                            </div>
                            <div class="satisfaction-card">
                                <img src="icons/thumbs up.svg" alt="" class="thumbs-up" />
                                <p class="satisfaction-text">
                                    Customer satisfaction rate
                                </p>
                                <p class="satisfaction-percentage">95%</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
